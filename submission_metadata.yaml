# ============================================================================
# AI tools declaration (transparency only)
# ============================================================================
ai_tools_used:
  - "Cursor"
  - "Claude"

ai_usage_summary: |
  Used AI coding assistants (Cursor / Claude) for pair-programming, code review,
  and architectural discussion. All data exploration, the 44-template audit and
  its tier grades, the ontology design, honeypot logic, and scoring formulation
  are our own engineering decisions, validated with our own local evaluation
  harness. No candidate data was sent to any hosted LLM, and the ranking step
  makes no network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Evidence-first ranker. EDA revealed the pool is built from only 44 canonical
  career-description templates, so we hand-audit each against the JD and validate
  a general lexical evidence scorer to reproduce those tiers exactly. Evidence is
  read from career descriptions (never the skills list, which is the keyword-
  stuffer trap surface); company names are treated as noise. A tier-lexicographic
  composite (evidence tier dominant) is refined within-tier by JD-fit (experience
  6-8y, Pune/Noida, notice) and a behavioral-availability multiplier. Honeypots
  are excluded via internal profile contradictions (experience inflation, phantom
  expertise). Pure-Python, deterministic, ~20-25s for 100k candidates on CPU, with
  fact-grounded reasoning per candidate.

